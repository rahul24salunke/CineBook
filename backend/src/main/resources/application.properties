spring.application.name=CineBook

# ---- Server ----
server.port=8181

# ---- Datasource (MySQL 8, database: cinebook) ----
spring.datasource.url=jdbc:mysql://localhost:3306/cinebook?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abhiram753@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ---- Logging ----
logging.level.org.hibernate.SQL=info
